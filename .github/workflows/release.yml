# .github/workflows/release.yml
name: Release SDK
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: yarn install --frozen-lockfile
      - run: yarn build
      - run: yarn test
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

  publish_npm:
    needs: build_and_test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - run: npm publish --access public --provenance --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  upload_r2:
    needs: publish_npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Upload to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          npx wrangler r2 object put spacepay-sdk/v${VERSION}/spacepay.bundle.js --file dist/spacepay.bundle.js --content-type "application/javascript"
          npx wrangler r2 object put spacepay-sdk/v${VERSION}/spacepay-full.bundle.js --file dist/spacepay-full.bundle.js --content-type "application/javascript"
          npx wrangler r2 object put spacepay-sdk/latest/spacepay.bundle.js --file dist/spacepay.bundle.js --content-type "application/javascript"
          npx wrangler r2 object put spacepay-sdk/latest/spacepay-full.bundle.js --file dist/spacepay-full.bundle.js --content-type "application/javascript"
